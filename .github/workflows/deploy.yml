name: Deploy Backend to Alibaba ECS

# Only trigger the robot when you push to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ALIBABA_HOST }}
          username: ${{ secrets.ALIBABA_USER }}
          key: ${{ secrets.ALIBABA_SSH_KEY }}
          script: |
            # 1. Navigate to your project folder
            cd /var/www/Global_AI_Hackathon_Series_with_Qwen_Cloud
            # 2. Pull the latest code
            git pull origin main
            # 3. Restart the PM2 process
            pm2 restart ai-backend
